name = "grc-ai-agent"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Node.js compatibility settings for Cloudflare Workers
[vars]
ENVIRONMENT = "production"
DEFAULT_PLATFORM = "servicenow"

# Note: Set sensitive secrets via 'npx wrangler secret put KEY_NAME' or in .dev.vars for local testing:
# GEMINI_API_KEY
# SERVICENOW_INSTANCE_URL
# SERVICENOW_USERNAME
# SERVICENOW_PASSWORD
# SERVICENOW_USE_LIVE
